<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browse Cafés — NomadSpot Taiwan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <div class="map-shell">
    <header class="header">
      <a class="logo" href="/">
        <img class="logo-img" src="assets/icons/logo.svg" alt="NomadSpot Taiwan" />
      </a>
    </header>

    <section class="map-canvas">
      <div id="leaflet-map"></div>
    </section>

    <aside class="aside">
      <div class="drag-handle" id="aside-drag" aria-label="Drag to expand"></div>
      <div class="panel-header">
        <h2>Browse Cafés</h2>
      </div>
      <button class="btn-filter" id="filter-btn">
        <span><span class="ic">⚙</span> Filter cafés</span>
        <span class="badge" id="filter-badge">0</span>
      </button>
      <div class="entry-list" id="entry-list">
        <div class="loading">Loading cafés…</div>
      </div>
    </aside>
  </div>

  <div class="backdrop" id="backdrop"></div>
  <aside class="detail-panel" id="detail-panel" style="display:none"></aside>

  <aside class="filter-drawer" id="filter-drawer" aria-hidden="true">
    <div class="drag-handle" id="filter-drag" aria-label="Drag to close"></div>
    <div class="drawer-header">
      <h2>Filter</h2>
      <button class="icon-btn" id="filter-close" aria-label="Close">✕</button>
    </div>
    <div class="drawer-body">
      <h3 class="drawer-section-title">Availability</h3>
      <div class="toggle-row" id="open-today-row">
        <span class="label"><span class="ic"><img src="assets/icons/clock.svg" alt="Location Icon" width="16" height="16"></span> Open today</span>
        <span class="switch" id="open-today-switch" role="switch" aria-checked="false"></span>
      </div>

      <h3 class="drawer-section-title">Region</h3>
      <ul class="region-list" id="region-list">
        <li data-region="North"><span class="region-icon"><img src="assets/icons/north2.svg" alt="Location Icon" width="16" height="16"></span> North</li>
        <li data-region="Central"><span class="region-icon"><img src="assets/icons/central.svg" alt="Location Icon" width="16" height="16"></span> Central</li>
        <li data-region="South"><span class="region-icon"><img src="assets/icons/south2.svg" alt="Location Icon" width="16" height="16"></span> South</li>
        <li data-region="East"><span class="region-icon"><img src="assets/icons/east2.svg" alt="Location Icon" width="16" height="16"></span> East</li>
      </ul>

      <h3 class="drawer-section-title">Facilities</h3>
      <div class="facilities" id="facility-list"></div>

      <div class="filter-result-count" id="filter-result-count">— cafés found</div>
    </div>
    <div class="drawer-footer">
      <button class="btn-ghost" id="filter-clear">Clear all</button>
      <button class="btn-block compact" id="filter-apply">Apply Filters</button>
    </div>
  </aside>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>
</body>
</html>
